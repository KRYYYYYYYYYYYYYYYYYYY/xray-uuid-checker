name: UUID Alive Check

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 * * * *' # Проверка каждый час

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Run Checker
        run: python main.py
        env:
          # Если API доступен извне, можно прокинуть секреты
          XRAY_API_HOST: ${{ secrets.XRAY_HOST }} 
