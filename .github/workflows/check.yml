name: VLESS UUID Scan

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Возможность запустить вручную

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Даем боту право пушить изменения в файлы
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Xray Core
        run: bash core/scripts/install_xray.sh

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Deps
        run: pip install -r requirements.txt

      - name: Run Deep Check
        run: python core/scripts/main.py  # Убрали scripts/, добавили core/scripts/

      - name: Commit and Push Results
        run: |
          git config --global user.name "UUID-Checker-Bot"
          git config --global user.email "bot@github.com"
          git add results/valid.txt
          git commit -m "Update valid UUIDs [skip ci]" || echo "No changes to commit"
          git push
