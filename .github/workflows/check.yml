name: VLESS UUID Scan

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: # Возможность запустить вручную

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Даем боту право пушить изменения в файлы
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Install Xray Core
        run: |
          mkdir -p core
          curl -L -o xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip xray.zip -d core
          chmod +x core/xray

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Deps
        run: |
          pip install --no-cache-dir -r requirements.txt
          pip install python-v2ray

      - name: Install V2Ray
        run: |
          for i in 1 2 3; do
            curl -fL https://github.com/v2fly/v2ray-core/releases/latest/download/v2ray-linux-64.zip -o v2ray.zip && break
            sleep 2
          done
          unzip -o v2ray.zip -d v2ray
          sudo mv v2ray/v2ray /usr/local/bin/
          sudo chmod +x /usr/local/bin/v2ray

      - name: Run Deep Check
        run: python core/scripts/main.py  # Убрали scripts/, добавили core/scripts/

      - name: Commit and Push Results
        run: |
          git config --global user.name "UUID-Checker-Bot"
          git config --global user.email "bot@github.com"
          # Синхронизируемся с remote перед подготовкой commit,
          # чтобы избежать non-fast-forward в параллельных запусках.
          git pull --rebase origin main || true
          git add results/valid.txt || true
          git add results/report.json || true
          # Пушим, если есть изменения в валидных ссылках или в отчете
          if ! git diff --cached --quiet; then
            git commit -m "Update scan results [skip ci]"
            git push origin HEAD:main || (git pull --rebase origin main && git push origin HEAD:main)
          fi
